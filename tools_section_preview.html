* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #060612; }
.tools-wrap {
  background: linear-gradient(180deg, #0a0920, #0f0d2a);
  padding: 5rem 2rem 6rem;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.tools-label {
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: #A78BFA;
  text-align: center;
  margin-bottom: .75rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .6rem;
}
.tools-label::before { content: '//'; color: #EC4899; }
.tools-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.5rem;
  letter-spacing: .04em;
  text-align: center;
  color: #f4f0ff;
  margin-bottom: .5rem;
}
.tools-title span {
  background: linear-gradient(135deg, #A78BFA, #F472B6, #38BDF8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.tools-sub {
  color: rgba(244,240,255,.45);
  text-align: center;
  font-size: .88rem;
  margin-bottom: 3.5rem;
  line-height: 1.8;
}
.tools-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 1rem;
  max-width: 1100px;
  margin: 0 auto 1rem;
}
.tools-grid-row2 {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 1rem;
  max-width: 1100px;
  margin: 0 auto;
}
.tool-card {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 16px;
  padding: 1.4rem .8rem 1rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .65rem;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(30px) scale(.92);
  transition:
    opacity .6s cubic-bezier(.16,1,.3,1),
    transform .6s cubic-bezier(.16,1,.3,1),
    border-color .35s,
    box-shadow .35s,
    background .35s;
}
.tool-card.vis {
  opacity: 1;
  transform: none;
}
.tool-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle 120px at 50% 30%, var(--glow, rgba(139,92,246,.22)), transparent 70%);
  opacity: 0;
  transition: opacity .4s;
  pointer-events: none;
}
.tool-card:hover::before { opacity: 1; }
.tool-card:hover {
  border-color: rgba(139,92,246,.45);
  box-shadow: 0 16px 48px rgba(139,92,246,.18);
  background: rgba(255,255,255,.07);
}
.tool-card::after {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 50%; height: 100%;
  background: linear-gradient(105deg, transparent, rgba(255,255,255,.07), transparent);
  transition: left .55s cubic-bezier(.16,1,.3,1);
  pointer-events: none;
}
.tool-card:hover::after { left: 160%; }
.tool-icon-wrap {
  width: 60px;
  height: 60px;
  border-radius: 14px;
  overflow: hidden;
  flex-shrink: 0;
  transition: transform .4s cubic-bezier(.16,1,.3,1);
  position: relative;
  z-index: 1;
}
.tool-card:hover .tool-icon-wrap {
  transform: translateY(-5px) scale(1.1) rotate(-3deg);
}
.tool-name {
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  color: rgba(244,240,255,.45);
  letter-spacing: .06em;
  text-align: center;
  transition: color .3s;
  position: relative;
  z-index: 1;
}
.tool-card:hover .tool-name { color: #A78BFA; }
.tool-tag {
  font-size: .58rem;
  font-family: 'DM Mono', monospace;
  padding: .18rem .55rem;
  border-radius: 3px;
  border: 1px solid rgba(139,92,246,.3);
  color: #A78BFA;
  letter-spacing: .08em;
  position: relative;
  z-index: 1;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity .3s, transform .3s;
}
.tool-card:hover .tool-tag { opacity: 1; transform: none; }

.floating-badge {
  position: absolute;
  background: rgba(10,9,32,.92);
  border: 1px solid rgba(255,255,255,.14);
  border-radius: 10px;
  padding: .5rem .9rem;
  backdrop-filter: blur(20px);
  animation: floatBadge 4s ease-in-out infinite;
  font-family: 'DM Mono', monospace;
}
@keyframes floatBadge { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap');
</style>
